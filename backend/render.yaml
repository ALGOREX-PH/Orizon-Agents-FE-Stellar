services:
  - type: web
    name: orizon-agents-be
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # ── Secrets — set these in the Render dashboard, never in git ──────
      - key: OPENAI_API_KEY
        sync: false
      - key: STELLAR_SIGNING_KEY
        sync: false

      # ── HTTP ────────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: http://localhost:3000    # replace with your Vercel URL after first FE deploy

      # ── Models ──────────────────────────────────────────────────────────
      - key: ORCHESTRATOR_MODEL
        value: gpt-5.3-codex
      - key: WORKER_MODEL
        value: gpt-5.3-codex

      # ── Stellar (testnet) ──────────────────────────────────────────────
      - key: STELLAR_NETWORK
        value: testnet
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_NETWORK_PASSPHRASE
        value: "Test SDF Network ; September 2015"
      - key: STELLAR_AGENT_REGISTRY
        value: CAPHXWU53UZUZJGV7IAE57NNMH3YYB5MTWO6YA53KKMXSFVLOITBJ3GQ
